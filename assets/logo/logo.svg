<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="20" y="20" width="360" height="360" rx="60" fill="url(#bg)"/>

  <!-- Photo frame icon -->
  <rect x="100" y="80" width="200" height="160" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>

  <!-- Person silhouette -->
  <circle cx="200" cy="150" r="30" fill="#cbd5e1"/>
  <ellipse cx="200" cy="220" rx="55" ry="35" fill="#cbd5e1"/>

  <!-- Crop overlay -->
  <rect x="100" y="80" width="200" height="160" rx="16" fill="none" stroke="url(#accent2)" stroke-width="4" stroke-dasharray="12,6"/>
  <!-- Corner handles -->
  <rect x="96" y="76" width="16" height="16" rx="3" fill="url(#accent2)"/>
  <rect x="288" y="76" width="16" height="16" rx="3" fill="url(#accent2)"/>
  <rect x="96" y="228" width="16" height="16" rx="3" fill="url(#accent2)"/>
  <rect x="288" y="228" width="16" height="16" rx="3" fill="url(#accent2)"/>

  <!-- Swatch bar -->
  <rect x="120" y="260" width="24" height="24" rx="4" fill="#ef4444"/>
  <rect x="152" y="260" width="24" height="24" rx="4" fill="#3b82f6"/>
  <rect x="184" y="260" width="24" height="24" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="216" y="260" width="24" height="24" rx="4" fill="#9ca3af"/>
  <rect x="248" y="260" width="24" height="24" rx="4" fill="#22c55e"/>

  <!-- Arrow -->
  <line x1="280" y1="272" x2="318" y2="272" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <polygon points="320,272 310,266 310,278" fill="#fbbf24"/>

  <!-- Download icon (right) -->
  <rect x="326" y="256" width="32" height="32" rx="6" fill="url(#accent)"/>
  <line x1="342" y1="264" x2="342" y2="280" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="342,280 336,274 348,274" fill="#fff"/>

  <!-- Name -->
  <text x="200" y="330" text-anchor="middle" font-size="22" font-weight="bold" fill="#fff">智能证件照</text>
  <text x="200" y="358" text-anchor="middle" font-size="14" fill="#94a3b8">ID Photo Maker</text>
</svg>
